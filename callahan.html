<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Callahan - Conway Game of Life</title>

<style>
body{
  margin:0;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

canvas{
  border:1px solid #ccc;
}
</style>

</head>

<body>

<canvas id="life" width="900" height="600"></canvas>

<script>

const canvas=document.getElementById("life");
const ctx=canvas.getContext("2d");

const cellSize=12;
let live=new Set();

function add(x,y){
 live.add(`${x},${y}`);
}

/* Callahan RLE convertido */
add(6,0);

add(4,1);
add(6,1);
add(7,1);

add(4,2);
add(6,2);

add(4,3);

add(2,4);

add(0,5);
add(1,5);


function countNeighbors(x,y){

 let dirs=[-1,0,1];
 let c=0;

 for(let dx of dirs)
 for(let dy of dirs){

   if(dx===0&&dy===0) continue;

   if(live.has(`${x+dx},${y+dy}`))
      c++;

 }

 return c;
}


function step(){

 let candidates=new Set();

 for(let p of live){

   let [x,y]=p.split(",").map(Number);

   for(let dx=-1;dx<=1;dx++)
   for(let dy=-1;dy<=1;dy++)
      candidates.add(`${x+dx},${y+dy}`);
 }

 let next=new Set();

 for(let p of candidates){

   let [x,y]=p.split(",").map(Number);

   let n=countNeighbors(x,y);

   if(live.has(p)){

      if(n===2||n===3)
         next.add(p);

   }else{

      if(n===3)
         next.add(p);

   }

 }

 live=next;

 draw();

}

function draw(){

 ctx.clearRect(0,0,900,600);

 for(let p of live){

   let [x,y]=p.split(",").map(Number);

   ctx.fillRect(
      x*cellSize+300,
      y*cellSize+200,
      cellSize,
      cellSize
   );

 }

}

draw();

setInterval(step,250);

</script>

</body>
</html>
