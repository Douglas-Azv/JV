<body>

<div style="position:absolute;top:20px;left:20px">

<button id="playBtn">
▶ Iniciar
</button>

</div>

<canvas id="life" width="900" height="600"></canvas>

<script>

const canvas=document.getElementById("life");
const ctx=canvas.getContext("2d");

const btn=document.getElementById("playBtn");

const cellSize=12;

let live=new Set();
let running=false;
let timer=null;

function add(x,y){
 live.add(`${x},${y}`);
}

/* Callahan */
add(6,0);

add(4,1);
add(6,1);
add(7,1);

add(4,2);
add(6,2);

add(4,3);

add(2,4);

add(0,5);
add(1,5);

function countNeighbors(x,y){

 let c=0;

 for(let dx=-1;dx<=1;dx++)
 for(let dy=-1;dy<=1;dy++){

   if(dx===0&&dy===0) continue;

   if(live.has(`${x+dx},${y+dy}`))
      c++;
 }

 return c;
}

function step(){

 let candidates=new Set();

 for(let p of live){

   let [x,y]=p.split(",").map(Number);

   for(let dx=-1;dx<=1;dx++)
   for(let dy=-1;dy<=1;dy++)
      candidates.add(`${x+dx},${y+dy}`);
 }

 let next=new Set();

 for(let p of candidates){

   let [x,y]=p.split(",").map(Number);

   let n=countNeighbors(x,y);

   if(live.has(p)){

      if(n===2||n===3)
         next.add(p);

   }else{

      if(n===3)
         next.add(p);

   }

 }

 live=next;

 draw();

}

function draw(){

ctx.clearRect(0,0,900,600);

for(let p of live){

let [x,y]=p.split(",").map(Number);

ctx.fillRect(
x*cellSize+300,
y*cellSize+200,
cellSize,
cellSize
);

}

}

btn.onclick=function(){

if(!running){

timer=setInterval(step,250);

running=true;

btn.innerText="⏸ Pausar";

}else{

clearInterval(timer);

running=false;

btn.innerText="▶ Iniciar";

}

}

draw();

</script>

</body>
