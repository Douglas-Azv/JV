<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Callahan - Conway Game of Life</title>

<style>

body{
    margin:0;
    background:white;
    overflow:hidden;
}

#controls{
    position:absolute;
    top:20px;
    left:20px;
    z-index:100;
}

button{
    padding:8px 14px;
    margin-right:5px;
    margin-bottom:5px;
    font-size:16px;
    cursor:pointer;
}

#speedLabel{
    font-size:16px;
    margin-left:10px;
}

canvas{
    display:block;
}

</style>

</head>

<body>

<div id="controls">

<button id="playBtn">▶ Iniciar</button>

<button id="zoomIn">+</button>

<button id="zoomOut">−</button>

<button id="slowBtn">🐢</button>

<button id="fastBtn">⚡</button>

<span id="speedLabel">
250 ms
</span>

</div>

<canvas id="life" width="1200" height="800"></canvas>

<script>

const canvas=document.getElementById("life");
const ctx=canvas.getContext("2d");

const playBtn=document.getElementById("playBtn");
const zoomIn=document.getElementById("zoomIn");
const zoomOut=document.getElementById("zoomOut");
const slowBtn=document.getElementById("slowBtn");
const fastBtn=document.getElementById("fastBtn");
const speedLabel=document.getElementById("speedLabel");

let running=false;
let timer=null;

let cellSize=14;

let speed=250;

let live=new Set();

function add(x,y){
 live.add(`${x},${y}`);
}

/* Callahan */

add(6,0);

add(4,1);
add(6,1);
add(7,1);

add(4,2);
add(6,2);

add(4,3);

add(2,4);

add(0,5);
add(1,5);


function countNeighbors(x,y){

let c=0;

for(let dx=-1;dx<=1;dx++)
for(let dy=-1;dy<=1;dy++){

if(dx===0&&dy===0)
continue;

if(live.has(`${x+dx},${y+dy}`))
c++;

}

return c;

}


function step(){

let candidates=new Set();

for(let p of live){

let [x,y]=p.split(",").map(Number);

for(let dx=-1;dx<=1;dx++)
for(let dy=-1;dy<=1;dy++)
candidates.add(`${x+dx},${y+dy}`);

}


let next=new Set();

for(let p of candidates){

let [x,y]=p.split(",").map(Number);

let n=countNeighbors(x,y);

if(live.has(p)){

if(n===2||n===3)
next.add(p);

}else{

if(n===3)
next.add(p);

}

}

live=next;

draw();

}


function draw(){

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

for(let p of live){

let [x,y]=p
.split(",")
.map(Number);

ctx.fillRect(
x*cellSize+450,
y*cellSize+250,
cellSize,
cellSize
);

}

}


function restartTimer(){

if(running){

clearInterval(timer);

timer=setInterval(
step,
speed
);

}

}


playBtn.onclick=function(){

if(!running){

timer=setInterval(
step,
speed
);

running=true;

playBtn.innerText="⏸ Pausar";

}else{

clearInterval(timer);

running=false;

playBtn.innerText="▶ Iniciar";

}

};


zoomIn.onclick=function(){

cellSize+=2;
draw();

};

zoomOut.onclick=function(){

if(cellSize>4){

cellSize-=2;

draw();

}

};


fastBtn.onclick=function(){

if(speed>50){

speed-=50;

speedLabel.innerText=
speed+" ms";

restartTimer();

}

};


slowBtn.onclick=function(){

speed+=50;

speedLabel.innerText=
speed+" ms";

restartTimer();

};


draw();

</script>

</body>
</html>
