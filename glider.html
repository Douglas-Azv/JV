
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Glider - Conway Game of Life</title>

<style>

body{
margin:0;
overflow:hidden;
background:white;
}

#controls{
position:absolute;
top:20px;
left:20px;
z-index:1000;
}

button{
padding:8px 14px;
margin-right:5px;
margin-bottom:5px;
font-size:16px;
cursor:pointer;
}

canvas{
display:block;
}

</style>
</head>

<body>

<div id="controls">

<button id="playBtn">
▶ Iniciar
</button>

<button id="zoomIn">
+
</button>

<button id="zoomOut">
−
</button>

</div>

<canvas id="life"></canvas>

<script>

const canvas=document.getElementById("life");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const playBtn=document.getElementById("playBtn");
const zoomIn=document.getElementById("zoomIn");
const zoomOut=document.getElementById("zoomOut");

let running=false;
let timer=null;

let cellSize=22;

let offsetX=window.innerWidth/2;
let offsetY=window.innerHeight/2;

let dragging=false;

let lastX=0;
let lastY=0;

let live=new Set();

function add(x,y){
live.add(`${x},${y}`);
}


/* GLIDER */

add(0,0);
add(1,0);
add(2,0);

add(0,1);

add(1,2);


/* ---------- */


function countNeighbors(x,y){

let c=0;

for(let dx=-1;dx<=1;dx++)
for(let dy=-1;dy<=1;dy++){

if(dx===0&&dy===0)
continue;

if(live.has(`${x+dx},${y+dy}`))
c++;

}

return c;

}



function step(){

let candidates=new Set();

for(let p of live){

let [x,y]=p.split(",").map(Number);

for(let dx=-1;dx<=1;dx++)
for(let dy=-1;dy<=1;dy++){

candidates.add(`${x+dx},${y+dy}`);

}

}


let next=new Set();

for(let p of candidates){

let [x,y]=p.split(",").map(Number);

let n=countNeighbors(x,y);

if(live.has(p)){

if(n===2||n===3)
next.add(p);

}else{

if(n===3)
next.add(p);

}

}

live=next;

draw();

}


function draw(){

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

ctx.strokeStyle="#eeeeee";

for(let x=offsetX%cellSize;
x<canvas.width;
x+=cellSize){

ctx.beginPath();

ctx.moveTo(x,0);

ctx.lineTo(
x,
canvas.height
);

ctx.stroke();

}


for(let y=offsetY%cellSize;
y<canvas.height;
y+=cellSize){

ctx.beginPath();

ctx.moveTo(
0,
y
);

ctx.lineTo(
canvas.width,
y
);

ctx.stroke();

}



ctx.fillStyle="black";

for(let p of live){

let [x,y]=p
.split(",")
.map(Number);

ctx.fillRect(

x*cellSize+offsetX,

y*cellSize+offsetY,

cellSize,

cellSize

);

}

}


playBtn.onclick=function(){

if(!running){

timer=setInterval(
step,
250
);

running=true;

playBtn.innerText=
"⏸ Pausar";

}else{

clearInterval(timer);

running=false;

playBtn.innerText=
"▶ Iniciar";

}

};


zoomIn.onclick=function(){

cellSize+=2;

draw();

};


zoomOut.onclick=function(){

if(cellSize>4){

cellSize-=2;

draw();

}

};


draw();

</script>

</body>
</html>
